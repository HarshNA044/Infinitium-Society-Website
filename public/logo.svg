<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background Circle (matches the dark circular background in the attached image) -->
  <circle cx="60" cy="60" r="56" fill="#081414" />
  
  <!-- Atom Symbol in neon cyan -->
  <g transform="translate(60, 50) scale(1.05)">
    <!-- Orbit Ellipses -->
    <ellipse cx="0" cy="0" rx="36" ry="13" fill="none" stroke="#22d3ee" stroke-width="2.2" transform="rotate(0)" />
    <ellipse cx="0" cy="0" rx="36" ry="13" fill="none" stroke="#22d3ee" stroke-width="2.2" transform="rotate(60)" />
    <ellipse cx="0" cy="0" rx="36" ry="13" fill="none" stroke="#22d3ee" stroke-width="2.2" transform="rotate(120)" />
    
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="8.5" fill="#22d3ee" />
    
    <!-- Electrons (placed on the orbit paths) -->
    <circle cx="36" cy="0" r="3.5" fill="#22d3ee" />
    <circle cx="-18" cy="31.2" r="3.5" fill="#22d3ee" />
    <circle cx="-18" cy="-31.2" r="3.5" fill="#22d3ee" />
  </g>

  <!-- Typography matching requested branding -->
  <text x="60" y="87" text-anchor="middle" font-size="11.5" font-weight="900" fill="#22d3ee" font-family="'Inter', system-ui, sans-serif" letter-spacing="0.04em">INFINITIUM</text>
  <text x="60" y="97" text-anchor="middle" font-size="5" font-weight="800" fill="#22d3ee" font-family="'Inter', system-ui, sans-serif" letter-spacing="0.16em" opacity="0.9">INSPIRING INNOVATION</text>
</svg>
